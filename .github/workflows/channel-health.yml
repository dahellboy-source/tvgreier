name: Kontroller kanalstatus

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: channel-health
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 9
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Kontroller offentlige strømmer
        run: node scripts/check-streams.mjs --write
        env:
          TVGREIER_CHECK_CONCURRENCY: '16'
          TVGREIER_CHECK_TIMEOUT: '8000'
      - name: Lagre bare statusendringer
        run: |
          if git diff --quiet -- src/data/channels.json; then
            echo "Ingen statusendringer."
            exit 0
          fi
          git config user.name "tvgreier health bot"
          git config user.email "tvgreier-health-bot@users.noreply.github.com"
          git add src/data/channels.json
          git commit -m "chore: oppdater kanalstatus"
          git push
